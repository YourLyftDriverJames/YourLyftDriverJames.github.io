<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media | Your Lyft Driver James</title>
<meta name="description" content="Follow Your Lyft Driver James on Instagram and YouTube.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0a10;
    --surface:#17141e;
    --border:rgba(255,255,255,.07);
    --text:#f5f3f7;
    --text-muted:#9a93a8;
    --grad-start:#7c3aed;
    --grad-mid:#ec4899;
    --grad-end:#f97316;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;
  }
  .page{max-width:560px;margin:0 auto;padding:3rem 1.5rem 4rem;position:relative;overflow:hidden;}
  .glow{
    position:absolute;top:-160px;left:50%;transform:translateX(-50%);
    width:480px;height:300px;
    background:linear-gradient(135deg,var(--grad-start),var(--grad-mid),var(--grad-end));
    filter:blur(100px);opacity:.28;pointer-events:none;z-index:0;
  }
  .eyebrow{
    font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--text-muted);margin:0 0 .75rem;font-weight:600;position:relative;z-index:1;
  }
  .hero h1{
    font-family:'Sora',sans-serif;font-weight:800;
    font-size:clamp(2rem,8vw,2.75rem);line-height:1.15;margin:0 0 1rem;
    position:relative;z-index:1;
  }
  .hero p{color:var(--text-muted);font-size:1rem;max-width:42ch;margin:0;position:relative;z-index:1;}

  .back-link{
    display:inline-flex;align-items:center;gap:.4rem;font-size:.8125rem;font-weight:600;
    color:var(--text-muted);text-decoration:none;margin-bottom:2rem;position:relative;z-index:1;
  }
  .back-link:hover{color:var(--text);}
  .back-link:focus-visible{outline:2px solid var(--grad-mid);outline-offset:3px;}

  .card-list{display:flex;flex-direction:column;gap:.85rem;margin:2.75rem 0 2rem;position:relative;z-index:1;}
  .card{
    display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:.9rem;
    background:var(--surface);border:1px solid var(--border);border-radius:18px;
    padding:1rem 1.15rem;text-decoration:none;color:var(--text);
    transition:border-color .15s ease,transform .15s ease;
  }
  .card:hover{border-color:rgba(255,255,255,.18);transform:translateY(-2px);}
  .card:focus-visible{outline:2px solid var(--grad-mid);outline-offset:3px;}
  .dot{width:38px;height:38px;border-radius:12px;flex-shrink:0;
    background:linear-gradient(135deg,var(--grad-start),var(--grad-mid),var(--grad-end));}
  .card-body{display:flex;flex-direction:column;}
  .card-title{font-family:'Sora',sans-serif;font-weight:600;font-size:1.0625rem;margin:0;}
  .card-desc{color:var(--text-muted);font-size:.875rem;margin:.15rem 0 0;}
  .arrow{color:var(--text-muted);font-size:1.25rem;transition:color .15s ease;}
  .card:hover .arrow{color:var(--text);}

  .footer{margin-top:3rem;color:var(--text-muted);font-size:.8125rem;text-align:center;position:relative;z-index:1;}

  @media(prefers-reduced-motion:reduce){.card,.arrow{transition:none;}}
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PXPNNMJEVV"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-PXPNNMJEVV');
</script>
</head>
<body>
<div class="page">
  <div class="glow" aria-hidden="true"></div>

  <a class="back-link" href="index.html">&larr; Back to all links</a>

  <header class="hero">
    <p class="eyebrow">Follow Along</p>
    <h1>Social Media</h1>
    <p>Ride clips, Colorado Springs scenery, and more.</p>
  </header>

  <nav class="card-list" aria-label="Social media links">

    <a class="card" href="https://www.instagram.com/sailor197979" target="_blank" rel="noopener noreferrer">
      <span class="dot" aria-hidden="true"></span>
      <span class="card-body">
        <span class="card-title">Instagram</span>
        <span class="card-desc">@sailor197979</span>
      </span>
      <span class="arrow" aria-hidden="true">&rarr;</span>
    </a>

    <a class="card" href="https://www.youtube.com/@lyftdriverjames" target="_blank" rel="noopener noreferrer">
      <span class="dot" aria-hidden="true"></span>
      <span class="card-body">
        <span class="card-title">YouTube</span>
        <span class="card-desc">Your Lyft Driver James</span>
      </span>
      <span class="arrow" aria-hidden="true">&rarr;</span>
    </a>

  </nav>

  <footer class="footer">
    <p>Thanks for riding &mdash; see you on the road.</p>
  </footer>

</div>
</body>
</html>
