<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send a Tip or Gift | Your Lyft Driver James</title>
<meta name="description" content="Send a tip or gift to Your Lyft Driver James via Venmo, Cash App, PayPal, or Throne.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0a10;
    --surface:#17141e;
    --border:rgba(255,255,255,.07);
    --text:#f5f3f7;
    --text-muted:#9a93a8;
    --grad-start:#7c3aed;
    --grad-mid:#ec4899;
    --grad-end:#f97316;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;
  }
  .page{max-width:560px;margin:0 auto;padding:3rem 1.5rem 4rem;position:relative;overflow:hidden;}
  .glow{
    position:absolute;top:-160px;left:50%;transform:translateX(-50%);
    width:480px;height:300px;
    background:linear-gradient(135deg,var(--grad-start),var(--grad-mid),var(--grad-end));
    filter:blur(100px);opacity:.28;pointer-events:none;z-index:0;
  }
  .eyebrow{
    font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--text-muted);margin:0 0 .75rem;font-weight:600;position:relative;z-index:1;
  }
  .hero h1{
    font-family:'Sora',sans-serif;font-weight:800;
    font-size:clamp(2rem,8vw,2.75rem);line-height:1.15;margin:0 0 1rem;
    position:relative;z-index:1;
  }
  .hero p{color:var(--text-muted);font-size:1rem;max-width:42ch;margin:0;position:relative;z-index:1;}

  .back-link{
    display:inline-flex;align-items:center;gap:.4rem;font-size:.875rem;font-weight:600;
    color:var(--text-muted);text-decoration:none;margin-bottom:2rem;position:relative;z-index:1;
  }
  .back-link:hover{color:var(--text);}
  .back-link:focus-visible{outline:2px solid var(--grad-mid);outline-offset:3px;}

  .prompt{
    font-family:'Sora',sans-serif;font-weight:700;font-size:1.25rem;text-align:center;
    margin:2.75rem 0 1.25rem;position:relative;z-index:1;
  }

  /* Payment method tile grid */
  .tile-grid{
    display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;
    max-width:340px;margin:2.75rem auto 2.75rem;position:relative;z-index:1;
  }
  .tile{
    position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    gap:.5rem;min-height:108px;padding:1.1rem .75rem .9rem;border-radius:18px;
    background:var(--surface);border:1px solid var(--border);
    text-decoration:none;color:var(--text);overflow:hidden;
    transition:border-color .15s ease,transform .15s ease;
  }
  .tile::before{
    content:'';position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,var(--grad-start),var(--grad-mid),var(--grad-end));
  }
  .tile:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px);}
  .tile:focus-visible{outline:2px solid var(--grad-mid);outline-offset:3px;}
  .tile svg{width:26px;height:26px;}
  .tile span{
    font-family:'Sora',sans-serif;font-weight:700;
    font-size:clamp(.9rem,3vw,1rem);line-height:1.3;
  }

  /* Social icon row */
  .icon-row{
    display:flex;justify-content:center;gap:.85rem;margin:0 0 2.75rem;position:relative;z-index:1;
  }
  .icon-tile{
    display:flex;align-items:center;justify-content:center;
    width:64px;height:64px;border-radius:16px;
    background:var(--surface);border:1px solid var(--border);
    transition:border-color .15s ease,transform .15s ease;
  }
  .icon-tile:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px);}
  .icon-tile:focus-visible{outline:2px solid var(--grad-mid);outline-offset:3px;}
  .icon-tile svg{width:28px;height:28px;}

  /* Recommendation CTA */
  .suggest{text-align:center;position:relative;z-index:1;}
  .suggest-btn{
    display:inline-flex;align-items:center;gap:.5rem;
    font-family:'Sora',sans-serif;font-weight:700;font-size:1rem;color:#fff;
    background:linear-gradient(135deg,var(--grad-start),var(--grad-mid),var(--grad-end));
    border-radius:16px;padding:.9rem 1.6rem;text-decoration:none;
    transition:transform .15s ease,opacity .15s ease;
  }
  .suggest-btn:hover{transform:translateY(-2px);opacity:.92;}
  .suggest-btn:focus-visible{outline:2px solid #fff;outline-offset:3px;}

  .footer{margin-top:3rem;color:var(--text-muted);font-size:.875rem;text-align:center;position:relative;z-index:1;}

  @media(prefers-reduced-motion:reduce){.tile,.icon-tile,.suggest-btn{transition:none;}}

  @media(max-width:380px){
    .tile-grid{gap:.5rem;max-width:300px;}
    .tile{min-height:100px;padding:.95rem .5rem .75rem;}
    .tile span{font-size:.875rem;}
  }
</style>

</head>
<body>
